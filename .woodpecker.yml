when:
  - event: push
    branch: main
  - event: manual
  - event: pull_request

steps:
  - name: fmt
    image: rust:1.88-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.88-bookworm
    commands:
      - cargo check --workspace

  - name: test
    image: rust:1.88-bookworm
    commands:
      - cargo test --workspace

  - name: clippy
    image: rust:1.88-bookworm
    commands:
      - rustup component add clippy
      - cargo clippy --workspace -- -D warnings

  - name: publish
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - cargo publish --allow-dirty 2>&1 || echo "Publish skipped (version may already exist)"
    when:
      - event: push
        branch: main

  # trigger-renovate step removed — woodpecker_token secret not configured,
  # which errored the pipeline at secret-validation time. Re-add when provisioned.

  - name: discord-success
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"rust_par2 published\",\"description\":\"Published to Forgejo registry.\",\"color\":3066993}]}"
    when:
      - event: push
        branch: main
        status: [success]

  - name: discord-failure
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"rust_par2 build failed\",\"description\":\"Check CI logs for details\",\"color\":15158332}]}"
    when:
      - status: [failure]
